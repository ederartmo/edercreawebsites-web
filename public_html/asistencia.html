<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistencia | Eder Crea Webs</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #18181b 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(24, 24, 27, 0.9);
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      background: var(--accent);
      color: #031106;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Abriendo atencion a clientes...</h1>
    <p>Te estoy redirigiendo a WhatsApp con un mensaje de asistencia del curso.</p>
    <a id="waLink" class="btn" href="#">Abrir WhatsApp ahora</a>
  </main>

  <script>
    (function () {
      var mensaje = "Hola, vengo por asistencia con el curso.";
      var whatsappUrl = "https://wa.link/eah465?text=" + encodeURIComponent(mensaje);

      var link = document.getElementById("waLink");
      link.href = whatsappUrl;

      setTimeout(function () {
        window.location.replace(whatsappUrl);
      }, 450);
    })();
  </script>
</body>
</html>
